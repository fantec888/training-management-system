spring.application.name=backend
server.port=8080

# MySQL profile for classroom remote database.
# Replace host, database, username, and password with values from the instructor.
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/training_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Remote MySQL usually stores shared or persistent data.
# Change to "always" only for the first demo initialization if the database is empty.
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

mybatis.configuration.map-underscore-to-camel-case=true

app.jwt.secret=training-management-demo-secret-key-2026-training-management-demo
app.jwt.expire-hours=12

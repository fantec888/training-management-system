spring.application.name=backend
server.port=8080

# Remote database template: replace with the server IP, database name,
# username, and password provided by your instructor.
# Default development database: local embedded H2 in MySQL compatibility mode.
spring.datasource.url=jdbc:h2:file:./data/training_management;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Switch to MySQL when you get the real classroom database credentials:
# spring.datasource.url=jdbc:mysql://127.0.0.1:3306/training_management?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
# spring.datasource.username=root
# spring.datasource.password=123456
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
mybatis.configuration.map-underscore-to-camel-case=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=training-management-demo-secret-key-2026-training-management-demo
app.jwt.expire-hours=12
